# PostgreSQL Database configuration for authentication
cas.authn.jdbc.query[0].driver-class=org.postgresql.Driver
cas.authn.jdbc.query[0].url=jdbc:postgresql://127.0.0.1:5432/casdb
cas.authn.jdbc.query[0].dialect=org.hibernate.dialect.PostgreSQLDialect
cas.authn.jdbc.query[0].user=yassine
cas.authn.jdbc.query[0].password=secret123
cas.authn.jdbc.query[0].sql=SELECT * FROM public.users WHERE username = ?
cas.authn.jdbc.query[0].field-password=password
cas.authn.jdbc.query[0].password-encoder.type=NONE

