# PostgreSQL MFA Google Authenticator JPA Configuration
cas.authn.mfa.gauth.jpa.url=jdbc:postgresql://127.0.0.1:5432/casdb
cas.authn.mfa.gauth.jpa.driver-class=org.postgresql.Driver
cas.authn.mfa.gauth.jpa.dialect=org.hibernate.dialect.PostgreSQLDialect
cas.authn.mfa.gauth.jpa.user=yassine
cas.authn.mfa.gauth.jpa.password=secret123
cas.authn.mfa.gauth.jpa.ddl-auto=update

# MFA Trigger - Enable MFA for all users
cas.authn.mfa.triggers.global.global-provider-id=mfa-gauth

# Google Authenticator MFA Configuration (CORRECTED FOR CAS 7.2)
# Remove deprecated properties: code-digits, issuer, label, rest.endpoint-url, time-step-size, window-size

# Core Google Authenticator settings
cas.authn.mfa.gauth.core.issuer=CAS Server
cas.authn.mfa.gauth.core.label=CAS MFA
cas.authn.mfa.gauth.core.code-digits=6
cas.authn.mfa.gauth.core.time-step-size=30
cas.authn.mfa.gauth.core.window-size=3

# Google Authenticator name and rank
cas.authn.mfa.gauth.name=Google Authenticator
cas.authn.mfa.gauth.rank=0

# Cleaner configuration
cas.authn.mfa.gauth.cleaner.schedule.enabled=true
cas.authn.mfa.gauth.cleaner.schedule.start-delay=PT20S
cas.authn.mfa.gauth.cleaner.schedule.repeat-interval=PT60S

# Management endpoints
management.endpoints.web.exposure.include=*
management.endpoints.web.base-path=/cas/actuator
management.endpoints.web.cors.allowed-origins=*
management.endpoints.web.cors.allowed-methods=GET,POST,PUT,DELETE
management.endpoint.health.show-details=always

# Enable specific actuator endpoints for Google Authenticator management
management.endpoint.gauthCredentials.enabled=true