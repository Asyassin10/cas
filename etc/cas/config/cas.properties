#cas.authn.mfa.gauth.jpa.url=jdbc:mysql://127.0.0.1:6034/casdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
#cas.authn.mfa.gauth.jpa.driver-class=com.mysql.cj.jdbc.Driver
